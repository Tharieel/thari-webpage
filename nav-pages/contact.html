        <!-- CONTACT FORM -->
        <main class="login-wrapper">
            <div class="login-form-container">
                <form action="action_page.php" method="post" class="login-form">
                    <h4 class="login-header">Kontakt</h4>

                    <label for="uname"><b class="small-text">Name</b></label>
                    <input type="text" placeholder="Name einfügen" name="uname" required>

                    <label for="email"><b class="small-text">E-Mail-Adresse</b></label>
                    <input type="text" placeholder="E-Mail-Adresse einfügen" name="email" required>

                    <label for="message"><b class="small-text">Nachricht</b></label>
                    <textarea id="message-entry" name="entry" cols="30" rows="10" minlength="10" placeholder="Ihre Nachricht" required></textarea>

                    <label class="small-text">
                        <input type="checkbox" name="remember" required>
                        <span>Ich bin mit der Verarbeitung meiner Eingaben zum Zwecke der Anfragebearbeitung einverstanden</span>
                    </label>

                    <ul class="login-register-form-buttons">
                        <li><button type="submit" class="btn btn-primary">Absenden</button></li>
                        <li><button type="reset" class="btn btn-primary">Zurücksetzen</button></li>
                        <hr class="short-line">
                        <li><a class="btn btn-primary" href="../de.html">Abbrechen</a></li>
                    </ul>
                </form>
