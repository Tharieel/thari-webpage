<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="book.css">
    <title>Book</title>
</head>
<body> 
    <div class="calendar-container">
    <div class="calendar-header">
        <button id="prevMonth">&#8592;</button>
        <h2 id="monthYear"></h2>
        <button id="nextMonth">&#8594;</button>
    </div>
    <div class="calendar-grid" id="calendarGrid">
        <!-- Tage werden hier von JS generiert -->
    </div>
</div>

    <div class="book-container">
    <!-- Linke Seite: Formular -->
    <div class="book-form">
        <h2>Dein Text</h2>
        <label for="title">Titel:</label>
        <input type="text" id="title" placeholder="Titel eingeben">

        <label for="date">Datum:</label>
        <input type="date" id="date" placeholder="Datum eingeben">

        <label for="author">Autor:</label>
        <input type="text" id="author" placeholder="Autor eingeben">

        <label for="content">Inhalt:</label>
        <textarea id="content" rows="10" placeholder="Text eingeben"></textarea>
    </div>

    <!-- Rechte Seite: Buch -->
    <div class="book-preview">
        <div class="page left-page">
        <h3 id="preview-title-left">Titel</h3>
        <h5 id="preview-date-left">Datum</h5>
        <p id="preview-content-left">Inhalt</p>
        </div>
        <div class="page right-page">
        <h3 id="preview-title-right">Titel</h3>
        <h5 id="preview-date-right">Datum</h5>
        <p id="preview-content-right">Inhalt</p>
        </div>
    </div>
    </div>

    <script src="book.js"></script>
</body>
</html>
